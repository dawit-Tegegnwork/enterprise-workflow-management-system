services:
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      WORKFLOW_DATABASE_URL: postgresql://workflow:workflow@postgres:5432/workflow
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 5
