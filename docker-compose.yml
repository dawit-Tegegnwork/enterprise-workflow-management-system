services:
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      WORKFLOW_DATABASE_URL: postgresql://workflow:workflow@postgres:5432/workflow
    depends_on:
      - postgres
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports:
      - "5433:5432"
